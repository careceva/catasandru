<svg width="204" height="118" viewBox="0 0 204 118" fill="none" xmlns="http://www.w3.org/2000/svg">

<style>
  /*
   * Synced to the CSS logoAlive animation (7s cycle, 1.4s delay).
   * Story: rest → look down → pause → SNAP surprise (eyebrows fly up)
   *        → wobble → settle → rest
   */

  #brow-a, #brow-b {
    transform-box: fill-box;
    transform-origin: center;
    animation: brow-story 7s linear 1.4s infinite;
  }

  @keyframes brow-story {
    /* rest */
    0%   { transform: translateY(0);      animation-timing-function: ease-in; }
    /* look down — follow the head tilt */
    22%  { transform: translateY(4px);    animation-timing-function: ease-out; }
    /* hold — staring */
    32%  { transform: translateY(4px);    animation-timing-function: cubic-bezier(0.15, 0, 0.1, 1.5); }
    /* SNAP — eyebrows shoot up with surprise */
    46%  { transform: translateY(-8px);   animation-timing-function: ease-in-out; }
    /* wobble 1 */
    55%  { transform: translateY(-3px);   animation-timing-function: ease-in-out; }
    /* wobble 2 */
    63%  { transform: translateY(-6px);   animation-timing-function: ease-in-out; }
    /* drift to rest */
    80%  { transform: translateY(-1px);   animation-timing-function: ease-in-out; }
    /* rest */
    100% { transform: translateY(0); }
  }
</style>

